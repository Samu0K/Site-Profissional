<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background-image: url('./Imagens/Papel de parede abstrato de gradiente azul de estilo mínimo com vetor de efeito borrado _ Vetor Grátis.jpeg');
        background-repeat: no-repeat; /* Esta é a função que você buscou */
        background-size: cover;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center; /* Centraliza o conteúdo horizontalmente */
    }

    .lista_de_diplomas {
        width: 90%; /* Ocupa 90% da tela no mobile */
        max-width: 900px; /* Não passa de 900px no desktop */
        background-color: #009bb6;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 10px rgba(0, 3, 153, 0.2);
        text-align: center;
        /* Removido o position: fixed para permitir rolagem */
    }

    .lista_de_diplomas h1 {
        color: #ffffff;
        margin-bottom: 10px;
    }

    .lista_de_diplomas p {
        color: #000000;
        font-weight: bold;
        margin-bottom: 30px;
    }

    /* Regra geral para as imagens dos diplomas */
    .lista_de_diplomas img {
        width: 100%; /* Ocupa toda a largura disponível do container */
        max-width: 800px; /* Mas não fica maior que 800px */
        height: auto; /* Mantém a proporção da foto */
        margin-top: 15px;
        border-radius: 4px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        display: block; /* Garante que a imagem fique abaixo do link */
        margin-left: auto;
        margin-right: auto;
    }

    .lista_de_diplomas ul {
        list-style-type: none;
        padding: 0;
    }
     
    .lista_de_diplomas li {
        margin-bottom: 50px; /* Mais espaço entre um diploma e outro */
    }

    .lista_de_diplomas a {
        color: #ffffff;
        text-decoration: none;
        font-size: 20px;
        font-weight: bold;
        display: inline-block;
        margin-bottom: 10px;
    }

    .lista_de_diplomas a:hover {
        text-decoration: underline;
        color: #e0e0e0;
    }

    /* Configuração inicial da imagem */
    .lista_de_diplomas img {
    /* ... mantenha suas regras anteriores e adicione estas: */
    transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
    cursor: pointer;
    }

/* Efeito quando o mouse passa por cima (Hover) */
    .lista_de_diplomas img:hover {
    transform: scale(1.05); /* Aumenta a imagem em 5% */
    filter: brightness(1.1); /* Dá um leve brilho */
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); /* Sombra mais profunda */
    }

    body.dark-mode {
    background-color: #121212 !important;
    color: white !important;
  }
  
  /* Se quiser que o banner mude também nas outras páginas */
   

   .icon {
        position: absolute;
        top: 5px;
        font-size: 18px;
        transition: 0.4s;
    }

    /* Posição do Sol (Modo Light) */
    .sun {
        left: 3.9px;
        opacity: 1;
    }

    /* Posição da Lua (Modo Dark) */
    .moon {
        right: 6px;
        opacity: 0; /* Começa invisível */
    }

    /* Quando o Switch é ativado (DARK MODE) */
    input:checked + .slider .sun {
        opacity: 0; /* Esconde o sol */
        transform: rotate(360deg);
    }

    input:checked + .slider .moon {
        opacity: 1; /* Mostra a lua */
        transform: rotate(360deg);
    }

    /* Ajuste do fundo do slider para o tema */
    input:checked + .slider {
        background-color: #2c3e50; /* Um azul escuro para a noite */
    }

        /* A caixa que envolve o switch */
        .switch {
        position: relative;
        display: inline-block;
        width: 80px;
        height: 34px;
        }

        /* Esconde o checkbox original */
        .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        }

        /* O fundo do switch (o trilho) */
        .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: .4s;
        border-radius: 34px;
        }

        /* O círculo branco que se move */
        .slider:before {
        position: absolute;
        content: "";
        height: 26px;
        width: 26px;
        left: 4px;
        bottom: 4px;
        background-color: rgb(255, 255, 255);
        transition: .4s;
        border-radius: 50%;
        }

        /* Cor de fundo quando estiver "Ligado" (Checked) */
        input:checked + .slider {
        background-color: #2196F3;
        }

        /* Move o círculo para a direita quando clicado */
        input:checked + .slider:before {
        transform: translateX(46px);
        }

        body.dark-mode {
        background-color: #121212 !important;
        background-image: none !important; /* Remove o azul no dark */
        color: white !important;
        }

        body.dark-mode .lista_de_diplomas {
        background-color: #1a1a1a !important;
        border: 1px solid #333;
        }

        body.dark-mode #ola {
        color: #ffffff !important;
        }

    
</style> 
<body>
    <div class="theme-container">
    <label class="switch">
        <input type="checkbox" id="theme-toggle">
        <span class="slider round">
            <span class="icon sun">☀️</span>
            <span class="icon moon">🌙</span>
    </label>
</div>
</label>
    <div class="lista_de_diplomas">
    <h1>Diplomas</h1>
    <p id="ola">Aqui estão os diplomas e certificados que obtive ao longo da minha jornada acadêmica e profissional:</p>
    <ul id="lista_de_diplomas">

        <img id="certificado_android" src ="./imagens/Diploma.png" alt="Certifdficado de Desenvolvimento Android"></li>
        
        <li><a href="./Imagens/Diploma web.png" target="_blank">Certificado de Curso de Desenvolvimento Web</a>
        <img id="diploma_web" src ="./imagens/Diploma web.png" alt="Certificado de Desenvolvimento Web"></li>

        <script src="logica.js"></script>
   
    </body>
</html>
